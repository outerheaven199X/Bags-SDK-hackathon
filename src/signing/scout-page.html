<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Preview — Bags.fm SDK</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0e13;
  --card: #141820;
  --border: #1e2530;
  --text: #e8eaed;
  --dim: #8b929a;
  --accent: #00ff41;
  --accent-dim: rgba(0,255,65,0.15);
  --danger: #ff4444;
  --danger-dim: rgba(255,68,68,0.15);
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 24px 16px;
}
.container { max-width: 520px; width: 100%; }
.header {
  text-align: center;
  margin-bottom: 24px;
}
.header svg { width: 32px; height: 32px; }
.header h1 {
  font-size: 20px;
  font-weight: 800;
  margin-top: 8px;
  color: var(--accent);
}
.header p { color: var(--dim); font-size: 13px; margin-top: 4px; }

/* Phase dots */
.phases {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
}
.phase-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.3s;
}
.phase-dot.active { background: var(--accent); }
.phase-dot.done { background: var(--accent); opacity: 0.5; }

/* Image preview */
.preview-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  position: relative;
}
.preview-image {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
  background: #1a1f28;
}
.preview-placeholder {
  width: 100%;
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #1a1f28;
  color: var(--dim);
  font-size: 14px;
  gap: 16px;
}
.preview-overlay {
  position: absolute;
  inset: 0;
  background: rgba(11, 14, 19, 0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 2;
}
.big-spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.overlay-text {
  color: var(--accent);
  font-size: 15px;
  font-weight: 700;
}
.overlay-sub {
  color: var(--dim);
  font-size: 12px;
}

/* Token info card */
.info-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}
.info-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--dim); }
.info-value { font-weight: 600; text-align: right; max-width: 60%; word-break: break-word; }
.reasoning {
  margin-top: 10px;
  padding: 10px;
  background: var(--accent-dim);
  border-radius: 8px;
  font-size: 12px;
  color: var(--accent);
  line-height: 1.5;
}

/* SOL amount picker */
.sol-picker {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}
.sol-picker h3 {
  font-size: 13px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}
.sol-presets {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.sol-preset {
  flex: 1;
  padding: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.2s, background 0.2s;
}
.sol-preset:hover { border-color: var(--accent); }
.sol-preset.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}
.sol-slider {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  outline: none;
  margin-bottom: 8px;
}
.sol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
}
.sol-slider::-moz-range-thumb {
  width: 20px; height: 20px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  cursor: pointer;
}
.sol-display {
  text-align: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-approve {
  background: var(--accent);
  color: #000;
}
.btn-regen {
  background: var(--danger-dim);
  color: var(--danger);
  border: 1px solid var(--danger);
}

/* Wallet picker */
.wallet-section { display: none; margin-bottom: 16px; }
.wallet-section.visible { display: block; }
.wallet-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.wallet-btn {
  padding: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.2s;
}
.wallet-btn:hover { border-color: var(--accent); }

/* Status */
.status {
  text-align: center;
  padding: 12px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 16px;
  display: none;
}
.status.visible { display: block; }
.status.info { background: var(--accent-dim); color: var(--accent); }
.status.error { background: var(--danger-dim); color: var(--danger); }
.status.loading { background: var(--accent-dim); color: var(--accent); }

/* Spinner */
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid transparent;
  border-top-color: currentColor;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="#00ff41" stroke-width="2"/><path d="M10 16l4 4 8-8" stroke="#00ff41" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <h1>Scout Preview</h1>
    <p id="headerSub">Review your token before launch</p>
  </div>

  <div class="phases">
    <div class="phase-dot active" id="dot-preview"></div>
    <div class="phase-dot" id="dot-wallet"></div>
    <div class="phase-dot" id="dot-sign"></div>
    <div class="phase-dot" id="dot-done"></div>
  </div>

  <div id="statusBar" class="status"></div>

  <!-- Phase 1: Preview (image + info + SOL picker + buttons) -->
  <div id="previewPhase">
    <div class="preview-card">
      <img id="previewImage" class="preview-image" style="display:none" alt="Token logo preview">
      <div id="previewPlaceholder" class="preview-placeholder">Generating logo...</div>
    </div>

    <div class="info-card" id="tokenInfo"></div>

    <div class="sol-picker" id="solPicker" style="display:none">
      <h3>Initial Buy</h3>
      <div class="sol-presets">
        <button class="sol-preset" data-sol="0">0 SOL</button>
        <button class="sol-preset" data-sol="0.1">0.1 SOL</button>
        <button class="sol-preset" data-sol="0.5">0.5 SOL</button>
        <button class="sol-preset" data-sol="1">1 SOL</button>
      </div>
      <input type="range" class="sol-slider" id="solSlider" min="0" max="2" step="0.01" value="0">
      <div class="sol-display" id="solDisplay">0 SOL</div>
    </div>

    <div class="btn-row" id="approveRow" style="display:none">
      <button class="btn btn-approve" id="btnApprove">Approve & Launch</button>
      <button class="btn btn-regen" id="btnRegen">Regenerate</button>
    </div>
  </div>

  <!-- Phase 2: Wallet connect -->
  <div class="wallet-section" id="walletPhase">
    <div class="info-card">
      <p style="text-align:center; font-weight:700; margin-bottom:12px;">Connect your wallet to launch</p>
    </div>
    <div class="wallet-grid" id="walletGrid"></div>
  </div>

  <!-- Phase 3: Signing -->
  <div id="signPhase" style="display:none">
    <div class="info-card" style="text-align:center">
      <p style="font-weight:700">Sign the transactions in your wallet</p>
      <p style="color:var(--dim); font-size:13px; margin-top:6px" id="signDesc"></p>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js" integrity="sha384-1/Ll6ABlJDlMx1URcif2stL9Fxod/1rg71YHzGqTl6Bwzi0Vq993Jt/oVLFXfUgQ" crossorigin="anonymous"></script>
<script>
var SESSION_ID = window.location.pathname.split('/').pop();
const API_BASE = `/api/scout/${SESSION_ID}`;

let sessionData = null;
let connectedWallet = null;
let walletProvider = null;
let selectedSol = 0;
let csrfToken = '';

var WALLETS = [
  { name: 'Phantom',      detect: function() { return window.phantom?.solana || (window.solana && window.solana.isPhantom && window.solana); } },
  { name: 'Solflare',     detect: function() { return window.solflare; } },
  { name: 'Backpack',     detect: function() { return window.backpack; } },
  { name: 'Coinbase',     detect: function() { return window.coinbaseSolana; } },
  { name: 'Trust Wallet', detect: function() { return window.trustwallet?.solana; } },
  { name: 'Brave',        detect: function() { return window.braveSolana || window.brave?.solana; } },
  { name: 'Exodus',       detect: function() { return window.exodus?.solana; } },
  { name: 'OKX',          detect: function() { return window.okxwallet?.solana; } },
];

/* ── Init ── */
async function init() {
  try {
    const res = await fetch(API_BASE);
    if (!res.ok) throw new Error('Session expired');
    sessionData = await res.json();
    csrfToken = sessionData.csrfToken || '';
    renderTokenInfo();
    renderImage();
    initSolPicker();
  } catch (e) {
    showStatus('Session expired or not found.', 'error');
  }
}

function renderTokenInfo() {
  const card = document.getElementById('tokenInfo');
  card.innerHTML = '';
  const rows = [
    ['Name', sessionData.meta.Name || sessionData.name],
    ['Symbol', sessionData.meta.Symbol || sessionData.symbol],
    ['Description', sessionData.description],
    ['Fee Split', sessionData.meta.Fees || 'Solo (100%)'],
    ['Source', sessionData.meta.Source || ''],
  ].filter(([,v]) => v);

  rows.forEach(function([k, v]) {
    var row = document.createElement('div');
    row.className = 'info-row';
    var label = document.createElement('span');
    label.className = 'info-label';
    label.textContent = k;
    var value = document.createElement('span');
    value.className = 'info-value';
    value.textContent = v;
    row.appendChild(label);
    row.appendChild(value);
    card.appendChild(row);
  });

  if (sessionData.reasoning) {
    var reasonDiv = document.createElement('div');
    reasonDiv.className = 'reasoning';
    reasonDiv.textContent = sessionData.reasoning;
    card.appendChild(reasonDiv);
  }
}

function renderImage() {
  const img = document.getElementById('previewImage');
  const placeholder = document.getElementById('previewPlaceholder');

  if (sessionData.imageUrl) {
    img.src = sessionData.imageUrl;
    img.style.display = 'block';
    placeholder.style.display = 'none';
    document.getElementById('approveRow').style.display = 'flex';
  } else {
    placeholder.textContent = 'No image generated — launch will proceed without a logo';
    document.getElementById('approveRow').style.display = 'flex';
  }
}

/* ── SOL Picker ── */
function initSolPicker() {
  const picker = document.getElementById('solPicker');
  picker.style.display = 'block';

  const slider = document.getElementById('solSlider');
  const display = document.getElementById('solDisplay');
  const presets = document.querySelectorAll('.sol-preset');

  function updateSol(val) {
    selectedSol = parseFloat(val);
    display.textContent = selectedSol + ' SOL';
    slider.value = selectedSol;
    presets.forEach(btn => {
      btn.classList.toggle('active', parseFloat(btn.dataset.sol) === selectedSol);
    });
  }

  slider.addEventListener('input', (e) => updateSol(e.target.value));
  presets.forEach(btn => {
    btn.addEventListener('click', () => updateSol(btn.dataset.sol));
  });
}

/* ── Approve → go to wallet phase ── */
document.getElementById('btnApprove').onclick = () => {
  setPhase('wallet');
  detectWallets();
};

/* ── Regenerate: just re-run the prompt, no textarea ── */
document.getElementById('btnRegen').onclick = async () => {
  const btn = document.getElementById('btnRegen');
  btn.disabled = true;
  btn.textContent = 'Regenerating...';
  showImageLoading();

  try {
    const res = await fetch(`${API_BASE}/regenerate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ csrfToken: csrfToken }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Regeneration failed');

    sessionData.imageUrl = data.imageUrl;
    removeImageOverlay();

    const img = document.getElementById('previewImage');
    img.src = data.imageUrl;
    img.style.display = 'block';
    document.getElementById('previewPlaceholder').style.display = 'none';
    document.getElementById('approveRow').style.display = 'flex';
    hideStatus();
  } catch (e) {
    removeImageOverlay();
    showStatus(e.message, 'error');
    document.getElementById('approveRow').style.display = 'flex';
  }
  btn.disabled = false;
  btn.textContent = 'Regenerate';
};

function showImageLoading() {
  removeImageOverlay();
  const card = document.querySelector('.preview-card');
  const overlay = document.createElement('div');
  overlay.className = 'preview-overlay';
  overlay.id = 'imageOverlay';
  overlay.innerHTML = `
    <div class="big-spinner"></div>
    <div class="overlay-text">Generating new logo...</div>
    <div class="overlay-sub">This takes 5-10 seconds, hang tight</div>
  `;
  card.appendChild(overlay);
}

function removeImageOverlay() {
  const existing = document.getElementById('imageOverlay');
  if (existing) existing.remove();
}

/* ── Wallet Connect ── */
function detectWallets() {
  var grid = document.getElementById('walletGrid');
  grid.innerHTML = '';
  var found = 0;
  for (var i = 0; i < WALLETS.length; i++) {
    var w = WALLETS[i];
    try {
      var provider = w.detect();
      if (!provider) continue;
      found++;
      var btn = document.createElement('button');
      btn.className = 'wallet-btn';
      btn.textContent = w.name;
      btn.addEventListener('click', (function(name, prov) {
        return function() { connectWallet(name, prov); };
      })(w.name, provider));
      grid.appendChild(btn);
    } catch (_) {
      /* wallet detection threw — skip */
    }
  }
  if (!found) {
    grid.innerHTML = '<p style="color:var(--dim); text-align:center; grid-column:1/-1; padding:20px; line-height:1.8">' +
      'No Solana wallets detected.<br>' +
      '<a href="https://phantom.app" target="_blank" style="color:var(--accent)">Phantom</a> · ' +
      '<a href="https://solflare.com" target="_blank" style="color:var(--accent)">Solflare</a> · ' +
      '<a href="https://backpack.app" target="_blank" style="color:var(--accent)">Backpack</a> · ' +
      '<a href="https://trustwallet.com" target="_blank" style="color:var(--accent)">Trust Wallet</a> · ' +
      '<a href="https://okx.com/web3" target="_blank" style="color:var(--accent)">OKX</a>' +
      '</p>';
  }
}

async function connectWallet(name, provider) {
  showStatus('Connecting ' + name + '...', 'loading');
  try {
    var resp = await provider.connect({ onlyIfTrusted: false });
    var pubkey = (resp.publicKey && resp.publicKey.toString()) || (provider.publicKey && provider.publicKey.toString());
    if (!pubkey) throw new Error('Could not read public key from ' + name);

    connectedWallet = pubkey;
    walletProvider = provider;
    var shortAddr = pubkey.slice(0, 4) + '...' + pubkey.slice(-4);
    showStatus('Connected to ' + name + ' (' + shortAddr + '). Building transactions...', 'info');

    var initialBuyLamports = Math.round(selectedSol * 1_000_000_000);
    showStatus('Building fee setup transactions...', 'loading');
    var res = await fetch(API_BASE + '/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ wallet: pubkey, initialBuyLamports: initialBuyLamports, csrfToken: csrfToken }),
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Approval failed');

    setPhase('sign');

    if (data.phase === 'fee_config') {
      showStatus('Sign fee setup (' + data.transactions.length + ' tx)...', 'loading');
      var feeSigs = await signTransactions(data.transactions, data.description);

      showStatus('Building launch transaction...', 'loading');
      var feeRes = await fetch(API_BASE + '/fee-signed', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ signatures: feeSigs, csrfToken: csrfToken }),
      });
      var launchData = await feeRes.json();
      if (!feeRes.ok) throw new Error(launchData.error || 'Failed to build launch tx');

      showStatus('Sign launch transaction...', 'loading');
      var launchSigs = await signTransactions(launchData.transactions, launchData.description);
      await postComplete([...feeSigs, ...launchSigs]);
    } else {
      var sigs = await signTransactions(data.transactions, data.description);
      await postComplete(sigs);
    }
  } catch (e) {
    showStatus(name + ' error: ' + e.message, 'error');
  }
}

/* ── Signing ── */

/** Check whether a signature slot has a real (non-zero) signature. */
function isNonEmptySig(sig) {
  for (var i = 0; i < sig.length; i++) {
    if (sig[i] !== 0) return true;
  }
  return false;
}

/**
 * Check whether a VersionedTransaction already carries a real (non-zero) signature.
 * Returns the indices of pre-signed slots so we can save/restore them.
 */
function findPartialSignatures(vtx) {
  var preSigned = [];
  for (var i = 0; i < vtx.signatures.length; i++) {
    if (vtx.signatures[i].length === 64 && isNonEmptySig(vtx.signatures[i])) {
      preSigned.push({ index: i, sig: new Uint8Array(vtx.signatures[i]) });
    }
  }
  return preSigned;
}

/** Fetch a fresh blockhash + lastValidBlockHeight from RPC. */
async function getLatestBlockhash() {
  var rpcUrl = sessionData.rpcUrl || 'https://api.mainnet-beta.solana.com';
  var bhRes = await fetch(rpcUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      jsonrpc: '2.0', id: 1,
      method: 'getLatestBlockhash',
      params: [{ commitment: 'finalized' }],
    }),
  });
  var bhData = await bhRes.json();
  if (bhData.error) throw new Error('Failed to get blockhash: ' + bhData.error.message);
  return bhData.result.value;
}

/** Get the current block height from RPC. */
async function getBlockHeight() {
  var rpcUrl = sessionData.rpcUrl || 'https://api.mainnet-beta.solana.com';
  var res = await fetch(rpcUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      jsonrpc: '2.0', id: 1,
      method: 'getBlockHeight',
      params: [{ commitment: 'confirmed' }],
    }),
  });
  var data = await res.json();
  return data.result;
}

/**
 * Confirm a transaction with retry — resends every 2s until the blockhash expires.
 * @param {string} sig - Transaction signature.
 * @param {Uint8Array} rawTx - Serialized signed transaction (for resends).
 * @param {object} blockhashInfo - { blockhash, lastValidBlockHeight }.
 * @param {object} connection - Solana Connection instance.
 * @param {function} onStatus - Callback for status updates shown to user.
 */
async function confirmWithRetry(sig, rawTx, blockhashInfo, connection, onStatus) {
  var rpcUrl = sessionData.rpcUrl || 'https://api.mainnet-beta.solana.com';
  var POLL_MS = 2000;
  var MAX_RESENDS = 5;
  var resendCount = 0;

  while (true) {
    var currentHeight = await getBlockHeight();
    if (currentHeight > blockhashInfo.lastValidBlockHeight) {
      throw new Error(
        'Transaction expired (blockhash no longer valid). Please retry — this usually means network congestion.'
      );
    }

    var statusRes = await fetch(rpcUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        jsonrpc: '2.0', id: 1,
        method: 'getSignatureStatuses',
        params: [[sig], { searchTransactionHistory: true }],
      }),
    });
    var statusData = await statusRes.json();
    var value = statusData.result && statusData.result.value && statusData.result.value[0];

    if (value) {
      if (value.err) {
        throw new Error('Transaction failed on-chain: ' + JSON.stringify(value.err));
      }
      if (value.confirmationStatus === 'confirmed' || value.confirmationStatus === 'finalized') {
        return sig;
      }
    }

    if (resendCount < MAX_RESENDS) {
      resendCount++;
      if (onStatus) onStatus('Confirming... (resend ' + resendCount + '/' + MAX_RESENDS + ')');
      try {
        await connection.sendRawTransaction(rawTx, { skipPreflight: true });
      } catch (_e) { /* resend is best-effort */ }
    } else {
      if (onStatus) onStatus('Confirming... waiting for network');
    }

    await new Promise(function(r) { setTimeout(r, POLL_MS); });
  }
}

/**
 * Sign and send an array of base58-encoded transactions.
 * Handles both versioned and legacy txs, and correctly preserves
 * partial signatures from the API (e.g. mint keypair) that Phantom
 * would otherwise reject during simulation.
 */
async function signTransactions(txsBase58, description) {
  document.getElementById('signDesc').textContent = description || 'Confirm in your wallet';

  var rpcUrl = sessionData.rpcUrl || 'https://api.mainnet-beta.solana.com';
  var connection = new solanaWeb3.Connection(rpcUrl, 'confirmed');
  var signatures = [];

  for (var i = 0; i < txsBase58.length; i++) {
    showStatus('Signing transaction ' + (i + 1) + '/' + txsBase58.length + '...', 'loading');
    var txBytes = base58Decode(txsBase58[i]);
    var signedTx;
    var isVersioned = false;

    try {
      var vtx = solanaWeb3.VersionedTransaction.deserialize(txBytes);
      isVersioned = true;

      var preSigned = findPartialSignatures(vtx);

      if (preSigned.length > 0) {
        /* Zero out existing signatures so Phantom's simulation doesn't
           choke on "partial signature doesn't match" — Phantom verifies
           all non-zero sigs during signTransaction. */
        for (var p = 0; p < preSigned.length; p++) {
          vtx.signatures[preSigned[p].index] = new Uint8Array(64);
        }
      } else {
        var bhInfo = await getLatestBlockhash();
        vtx.message.recentBlockhash = bhInfo.blockhash;
      }

      signedTx = await walletProvider.signTransaction(vtx);

      /* Restore the API's partial signatures after the wallet signed. */
      for (var r = 0; r < preSigned.length; r++) {
        signedTx.signatures[preSigned[r].index] = preSigned[r].sig;
      }

    } catch (versionedErr) {
      if (isVersioned) {
        throw new Error('Wallet rejected transaction: ' + versionedErr.message);
      }

      var legacyTx = solanaWeb3.Transaction.from(txBytes);
      if (!legacyTx.feePayer) legacyTx.feePayer = walletProvider.publicKey;
      if (!legacyTx.recentBlockhash) {
        var freshBh = await connection.getLatestBlockhash();
        legacyTx.recentBlockhash = freshBh.blockhash;
      }
      signedTx = await walletProvider.signTransaction(legacyTx);
    }

    var serialized = signedTx.serialize();
    var confirmBhInfo = await getLatestBlockhash();
    var sig = await connection.sendRawTransaction(serialized, {
      skipPreflight: true,
    });

    showStatus('Transaction ' + (i + 1) + '/' + txsBase58.length + ' sent. Confirming...', 'info');

    await confirmWithRetry(sig, serialized, confirmBhInfo, connection, function(msg) {
      showStatus('Transaction ' + (i + 1) + '/' + txsBase58.length + ': ' + msg, 'info');
    });
    signatures.push(sig);
    showStatus('Transaction ' + (i + 1) + '/' + txsBase58.length + ' confirmed.', 'info');
  }
  return signatures;
}

async function postComplete(signatures) {
  await fetch(API_BASE + '/complete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ signatures: signatures, csrfToken: csrfToken }),
  });
  setPhase('done');
  showStatus('Token launched! Transaction confirmed.', 'info');
}

/* ── Helpers ── */
function setPhase(phase) {
  const phases = ['preview', 'wallet', 'sign', 'done'];
  const idx = phases.indexOf(phase);
  phases.forEach((p, i) => {
    const dot = document.getElementById(`dot-${p}`);
    dot.className = 'phase-dot' + (i < idx ? ' done' : i === idx ? ' active' : '');
  });

  document.getElementById('previewPhase').style.display = phase === 'preview' ? 'block' : 'none';
  document.getElementById('walletPhase').className = 'wallet-section' + (phase === 'wallet' ? ' visible' : '');
  document.getElementById('signPhase').style.display = phase === 'sign' ? 'block' : 'none';
}

function showStatus(msg, type) {
  const el = document.getElementById('statusBar');
  el.textContent = '';
  if (type === 'loading') {
    var spinner = document.createElement('span');
    spinner.className = 'spinner';
    el.appendChild(spinner);
    el.appendChild(document.createTextNode(' ' + msg));
  } else {
    el.textContent = msg;
  }
  el.className = 'status visible ' + type;
}

function hideStatus() {
  document.getElementById('statusBar').className = 'status';
}

/* Base58 decoder (same as launch page) */
function base58Decode(str) {
  var ALPHABET = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
  var bytes = [0];
  for (var ci = 0; ci < str.length; ci++) {
    var idx = ALPHABET.indexOf(str[ci]);
    if (idx === -1) throw new Error("Invalid base58 character: " + str[ci]);
    var carry = idx;
    for (var j = 0; j < bytes.length; j++) {
      carry += bytes[j] * 58;
      bytes[j] = carry & 0xff;
      carry >>= 8;
    }
    while (carry > 0) {
      bytes.push(carry & 0xff);
      carry >>= 8;
    }
  }
  for (var li = 0; li < str.length; li++) {
    if (str[li] !== "1") break;
    bytes.push(0);
  }
  return new Uint8Array(bytes.reverse());
}
